name: Bug report
description: Report a problem with a plugin or the marketplace itself.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. For questions or open-ended discussion, please use [Discussions](https://github.com/yukimasaki/claude-plugins/discussions) instead.

  - type: dropdown
    id: target
    attributes:
      label: Affected component
      options:
        - design-director
        - marketplace itself
        - other (describe in the body)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `/design-director`
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Run `claude --version`.
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs (use code blocks) or attach screenshots.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I have searched [existing issues](https://github.com/yukimasaki/claude-plugins/issues) for duplicates.
          required: true
