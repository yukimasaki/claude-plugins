name: Feature request
description: Suggest a new feature or enhancement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! For open-ended brainstorming, please consider posting to [Discussions](https://github.com/yukimasaki/claude-plugins/discussions) first.

  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - design-director
        - marketplace itself
        - new plugin proposal
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this address? Why is the current state not enough?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I have searched [existing issues](https://github.com/yukimasaki/claude-plugins/issues) and [discussions](https://github.com/yukimasaki/claude-plugins/discussions) for similar suggestions.
          required: true
