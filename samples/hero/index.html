<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>claude-plugins — brutalist v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #ffeb00; color: #000; -webkit-font-smoothing: antialiased; }
  .hero { width: 1280px; height: 640px; position: relative; }
  .grid { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: 1fr 1fr 1fr; width: 100%; height: 100%; }
  .title-cell { grid-column: 1; grid-row: 1 / 4; padding: 56px 48px 48px 64px; display: flex; flex-direction: column; justify-content: space-between; border-right: 6px solid #000; }
  .top {}
  .badge { display: inline-block; font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; background: #000; color: #ffeb00; padding: 6px 14px; }
  .title { font-size: 196px; font-weight: 900; letter-spacing: -0.07em; line-height: 0.82; text-transform: lowercase; margin-top: 28px; }
  .title .dot { color: #ff3b30; }
  .meta { font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 16px; display: flex; gap: 16px; }
  .meta span::before { content: '— '; }
  .meta span:last-child::after { content: ' —'; }
  .footer-block {}
  .tagline { font-size: 26px; font-weight: 800; line-height: 1.2; max-width: 600px; }
  .install { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; font-weight: 700; margin-top: 12px; padding: 6px 10px; background: #000; color: #ffeb00; align-self: start; display: inline-block; }
  .panel-cell { display: flex; align-items: center; justify-content: center; font-weight: 900; line-height: 1; padding: 24px; position: relative; overflow: hidden; }
  .pn { position: absolute; top: 16px; left: 20px; font-size: 13px; letter-spacing: 0.12em; opacity: 0.85; text-transform: uppercase; z-index: 2; }
  .pl { position: absolute; bottom: 16px; left: 20px; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.85; z-index: 2; }
  .pg { font-size: 132px; font-weight: 900; letter-spacing: -0.06em; }

  /* ========== A: Glass — explore. with shimmer light sweep ========== */
  .p1 {
    background:
      radial-gradient(ellipse 70% 60% at 70% 30%, rgba(168,85,247,0.65) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 30% 80%, rgba(236,72,153,0.55) 0%, transparent 60%),
      linear-gradient(135deg, #1e0b3a 0%, #2d1b4e 100%);
    color: #fff; border-bottom: 6px solid #000; position: relative; overflow: hidden;
  }
  .glass-text {
    font-family: 'Inter', "Helvetica Neue", sans-serif;
    font-size: 48px; font-weight: 600; letter-spacing: -0.025em; line-height: 1;
    background: linear-gradient(100deg,
      rgba(255,255,255,0.55) 0%,
      rgba(255,255,255,0.55) 35%,
      #ffffff 50%,
      rgba(255,255,255,0.55) 65%,
      rgba(255,255,255,0.55) 100%);
    background-size: 220% 100%;
    background-position: 100% 0;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 32px rgba(255,255,255,0.2), 0 2px 24px rgba(168,85,247,0.4);
    animation: glass-shimmer 4.5s ease-in-out infinite;
  }
  @keyframes glass-shimmer {
    0%, 100% { background-position: 120% 0; }
    50% { background-position: -20% 0; }
  }
  .p1::before {
    content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 70%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    filter: blur(0.5px); pointer-events: none; z-index: 1;
    margin-top: 36px;
  }

  /* ========== B: Terminal — $ generate with caret ========== */
  .p2 {
    background: #0a0a0a; color: #28c840; border-bottom: 6px solid #000;
    font-family: ui-monospace, "SF Mono", Menlo, "Cascadia Code", monospace;
    position: relative; overflow: hidden;
  }
  .p2 .pn, .p2 .pl { color: #888; }
  .term-content { font-size: 48px; font-weight: 600; letter-spacing: -0.02em; color: #28c840; line-height: 1; display: flex; align-items: baseline; gap: 8px; }
  .term-content .prompt { color: #28c840; opacity: 0.65; }
  .caret { display: inline-block; width: 18px; height: 1em; background: #28c840; vertical-align: -0.1em; margin-left: 4px; animation: caret-blink 1s steps(1) infinite; }
  @keyframes caret-blink { 50% { opacity: 0; } }

  /* ========== C: Playful — ship! with bouncing exclamation ========== */
  .p3 {
    background: linear-gradient(135deg, #ff4d8d 0%, #ff7eb3 100%); color: #fff;
    font-family: 'Inter', "Helvetica Neue", system-ui, sans-serif;
    position: relative; overflow: hidden;
  }
  .p3 .pn, .p3 .pl { color: rgba(255,255,255,0.92); }
  .play-text { font-family: 'Inter', "Helvetica Neue", sans-serif; font-size: 56px; font-weight: 900; letter-spacing: -0.035em; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.2); line-height: 1; display: inline-flex; align-items: baseline; }
  .play-text .bang {
    display: inline-block; color: #ffea00; margin-left: 2px;
    transform-origin: bottom center;
    animation: bang-pop 1.4s cubic-bezier(0.34, 1.6, 0.64, 1) infinite;
    text-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 24px rgba(255,234,0,0.4);
  }
  @keyframes bang-pop {
    0%   { transform: translateY(0)    rotate(8deg)  scale(1); }
    20%  { transform: translateY(-14px) rotate(-6deg) scale(1.15); }
    40%  { transform: translateY(-4px)  rotate(14deg) scale(0.95); }
    60%  { transform: translateY(-8px)  rotate(2deg)  scale(1.08); }
    80%  { transform: translateY(-2px)  rotate(10deg) scale(1); }
    100% { transform: translateY(0)    rotate(8deg)  scale(1); }
  }
  /* Optional: 3 dots get a sequenced bounce too, reinforcing the playful pop */
  .play-dots { position: absolute; top: 16px; right: 20px; display: flex; gap: 6px; z-index: 2; }
  .play-dots span {
    width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    animation: dot-bounce 1.4s ease-in-out infinite;
  }
  .play-dots span:nth-child(1) { background: #ffea00; animation-delay: 0s; }
  .play-dots span:nth-child(2) { background: #00e1a4; animation-delay: 0.18s; }
  .play-dots span:nth-child(3) { background: #fff;    animation-delay: 0.36s; }
  @keyframes dot-bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-6px); }
  }
</style>
</head>
<body>
<div class="hero">
  <div class="grid">
    <div class="title-cell">
      <div class="top">
        <span class="badge">Plugin Marketplace</span>
        <h1 class="title">claude-<br/>plugins<span class="dot">.</span></h1>
        <div class="meta"><span>MIT</span><span>Public OSS</span></div>
      </div>
      <div class="footer-block">
        <p class="tagline">Personal Claude Code plugin marketplace.<br/>Design-driven prototyping with design-director.</p>
        <div class="install">/plugin marketplace add yukimasaki/claude-plugins</div>
      </div>
    </div>
    <div class="panel-cell p1"><div class="pn">No. 01</div><div class="glass-text">explore.</div><div class="pl">Glass</div></div>
    <div class="panel-cell p2"><div class="pn">No. 02</div><div class="term-content"><span class="prompt">$</span>generate<span class="caret"></span></div><div class="pl">Terminal</div></div>
    <div class="panel-cell p3"><div class="pn">No. 03</div><div class="play-dots"><span></span><span></span><span></span></div><div class="play-text">ship<span class="bang">!</span></div><div class="pl">Playful</div></div>
  </div>
</div>
</body>
</html>
